# ──────────────────────────────────────────────
# Build & push Container image to GitHub Container Registry (ghcr.io)
# ──────────────────────────────────────────────
# Triggers:
#   • Push to main            → ghcr.io/pasta-devs/marinara-engine:sha-abc1234
#   • Tag v*                  → ghcr.io/pasta-devs/marinara-engine:1.4.0 + :latest
#   • Manual workflow_dispatch → same as push-to-main
# ──────────────────────────────────────────────
name: Build & Push Container Image

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      # Documentation & metadata
      - "**.md"
      - "docs/**"
      - "LICENSE"
      - "*.txt"
      # Tooling configs
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - ".markdownlint.json"
      - ".prettierignore"
      - ".prettierrc"
      # Compose / launcher / migration scripts
      - "docker-compose.yml"
      - "migrate-presets.cjs"
      - "migrate-variables.cjs"
      - "start.bat"
      - "start.sh"
      - "start-termux.sh"
      # Platform-specific sources
      - "android/**"
      - "win/**"
      - "MarinaraLauncher.exe"
      # GitHub community files
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  REGISTRY: ghcr.io

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # github.repository can have uppercase (Pasta-Devs/Marinara-Engine)
      # but Docker image refs must be all-lowercase
      - name: Lowercase image name
        id: lower
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}
          tags: |
            # On push to main → :sha-<short> :main
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            # On tag push → :1.2.3, :1.2, :1, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ steps.lower.outputs.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}
          tags: |
            # On push to main → :sha-<short> :main
            type=sha,prefix=sha-,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            # On tag push → :1.2.3, :1.2, :1, :latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Create manifest list and push
        id: manifest
        working-directory: /tmp/digests
        run: |
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          image="${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}"
          digests=$(printf "${image}@sha256:%s " *)
          docker buildx imagetools create $tags $digests
          # Get the digest of the pushed manifest list using raw format
          digest=$(docker buildx imagetools inspect "$image:${{ steps.meta.outputs.version }}" --raw | sha256sum | cut -d' ' -f1 | sed 's/^/sha256:/')
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}:${{ steps.meta.outputs.version }}

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}
          subject-digest: ${{ steps.manifest.outputs.digest }}
          push-to-registry: true
