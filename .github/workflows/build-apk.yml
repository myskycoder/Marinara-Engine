name: Build Android APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing vX.Y.Z release tag to attach APK to (leave blank for artifact-only build)"
        required: false
        type: string

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag || github.ref }}

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          gradle-version: "8.5"

      - name: Bootstrap Gradle wrapper
        working-directory: android
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          chmod +x ./gradlew

      - name: Decode signing key
        working-directory: android
        env:
          ANDROID_SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_SIGNING_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_SIGNING_KEYSTORE_BASE64" | base64 --decode > app/marinara-release.jks
          fi

      - name: Build release APK
        working-directory: android
        env:
          ANDROID_SIGNING_KEYSTORE: marinara-release.jks
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          ANDROID_SIGNING_STORE_TYPE: ${{ secrets.ANDROID_SIGNING_STORE_TYPE }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        working-directory: android
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          VERSION=$(node -p "require('../package.json').version")
          OUT_NAME="marinara-engine-${VERSION}.apk"
          cp "$APK_PATH" "$OUT_NAME"
          echo "apk=android/${OUT_NAME}" >> "$GITHUB_OUTPUT"
          echo "name=${OUT_NAME}" >> "$GITHUB_OUTPUT"
          ls -la "$OUT_NAME"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.locate.outputs.name }}
          path: ${{ steps.locate.outputs.apk }}

      - name: Attach APK to release
        if: github.event_name == 'release' || github.event.inputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
        run: |
          gh release upload "$TAG" "${{ steps.locate.outputs.apk }}" --clobber
